name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (lint, typecheck, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        # `pgvector/pgvector:pg16` is a strict superset of `postgres:16` —
        # standard PG 16 plus the `vector` extension. Required by the
        # `@strav/rag` e2e; harmless for every other suite.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: strav
          POSTGRES_PASSWORD: strav
          POSTGRES_DB: strav_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: strav
      DB_PASSWORD: strav
      DB_DATABASE: strav_test
      APP_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck
        # Skipped automatically when packages/ is empty (M1.1–M1.3 only)
        continue-on-error: ${{ !hashFiles('packages/*/src/**/*.ts') }}

      - name: Test
        run: bun test
        continue-on-error: ${{ !hashFiles('packages/*/src/**/*.ts', 'tests/**/*.ts') }}
