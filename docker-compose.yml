# Local Postgres for integration / e2e tests. Mirrors the CI `services.postgres`
# config in `.github/workflows/ci.yml`. Bring up with:
#
#   docker-compose up -d
#
# then copy `.env.test.example` to `.env.test` and `source` it before running:
#
#   source .env.test && bun test
#
# The integration suite self-skips when these env vars aren't set, so this is
# only needed when you want to run the integration / e2e tests locally.

services:
  postgres:
    # `pgvector/pgvector:pg16` is a strict superset of `postgres:16` —
    # standard PG 16 plus the `vector` extension preinstalled.
    # Required by `@strav/rag`'s e2e; harmless for every other test.
    image: pgvector/pgvector:pg16
    container_name: strav_postgres
    environment:
      POSTGRES_USER: strav
      POSTGRES_PASSWORD: strav
      POSTGRES_DB: strav_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "strav"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - strav_postgres_data:/var/lib/postgresql/data

  redis:
    # Standard Redis. Used by `@strav/cache/redis` integration tests.
    # The cache suite self-skips when REDIS_URL is unset, so this is
    # only needed when you want to run those tests locally.
    image: redis:7-alpine
    container_name: strav_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  memcached:
    # Used by `@strav/cache/memcached` integration tests.
    image: memcached:1.6-alpine
    container_name: strav_memcached
    ports:
      - "11211:11211"
    healthcheck:
      test: ["CMD-SHELL", "echo stats | nc -q 1 127.0.0.1 11211 | grep -q version"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    # S3-compatible object storage. Used by `@strav/storage/s3`
    # integration tests. The storage suite self-skips when S3_ENDPOINT
    # is unset, so this is only needed when you want to run those
    # tests locally.
    image: minio/minio:latest
    container_name: strav_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  strav_postgres_data:
